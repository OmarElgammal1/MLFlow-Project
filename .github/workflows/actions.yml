name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: churn-api
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Tests + coverage gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      - name: Run pytest (>=70% coverage gate)
        run: uv run pytest

  build-and-push:
    name: Build and push to Docker Hub
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and roll out new image
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}
          HYPERDX_API_KEY: ${{ secrets.HYPERDX_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ 22 }}
          envs: IMAGE,HYPERDX_API_KEY
          script: |
            set -euo pipefail
            echo "Pulling $IMAGE"
            docker pull "$IMAGE"
            docker rm -f churn-api 2>/dev/null || true
            docker run -d \
              --name churn-api \
              --restart unless-stopped \
              -p 8000:8000 \
              -e HYPERDX_API_KEY \
              -e OTEL_SERVICE_NAME=churn-api \
              -e OTEL_EXPORTER_OTLP_ENDPOINT=https://in-otel.hyperdx.io \
              "$IMAGE"
            docker image prune -f
            sleep 3
            docker ps --filter name=churn-api --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
